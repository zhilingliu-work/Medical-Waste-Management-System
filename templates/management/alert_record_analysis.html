<!-- templates/management/alert_record_analysis.html -->
<div style="display: flex; gap: 20px;">
    <div class="column is-12-wide" style="display: flex; flex-direction: column; gap: 10px; padding: 10px; width: 100%; box-sizing: border-box;">
        <div style="display: flex; gap: 20px; margin-right: 20px; justify-content: flex-end;">
            <div style="display: flex; align-items: center; margin-left: 10px; ">
                <div style="font-size: 1.2rem; font-weight: bold; color: var(--my-text-main); display: flex; align-items: center; gap: 8px; color: #db2828;">
                    <span class="ts-icon is-chart-line-icon" style="color: #db2828;"></span> 警示趨勢
                </div>
            </div>
            <switch style="display: flex; align-items: center; gap: 10px; margin-right: 10px; margin-left: auto;">
                <label class="ts-switch">
                    <input type="checkbox" id="showAllYearormonth" onchange="toggleShowYearormonth(this)">
                    <span class="ts-slider"></span>
                </label>
                <span style="color: var(--my-text-secondary); font-size: 0.9rem;">月/年</span>
            </switch>
            <input type="month" id="monthPicker" value="{{ current_month }}" onchange="updateAlertTrend()" style="height: 42px; font-size: 1rem; width: 150px; background-color: var(--my-bg-input); border: 1px solid var(--my-border); color: var(--my-text-main); border-radius: 6px; padding-left: 12px; box-sizing: border-box;">
            <div style="align-items: center; display: flex; gap: 10px;">
                <button id="exportBtn" class="ts-button btn-batch-white is-outlined" data-dropdown="export-menu">
                    <span class="ts-icon is-file-export-icon" style="margin-right: 6px;"></span> 匯出檔案
                    <span class="ts-icon is-angle-down-icon" style="margin-left: 6px; font-size: 0.8em;"></span>
                </button> 
                <div class="ts-dropdown" id="export-menu" data-position="bottom-end" style="z-index: 9999;">
                    <button class="item" onclick="exportToExcel()"><span class="ts-icon is-file-excel-icon" style="color: #21ba45; width: 20px;"></span> 匯出 Excel</button>
                    <button class="item" onclick="exportToPDF()"><span class="ts-icon is-file-pdf-icon" style="color: #db2828; width: 20px;"></span> 匯出 PDF</button>
                    <button class="item" onclick="exportToPNG()"><span class="ts-icon is-image-icon" style="color: #2185d0; width: 20px;"></span> 匯出 PNG</button>
                </div>
            </div>
            <button class="ts-button btn-batch-white is-outlined" style="margin-right: 10px;" onclick="printSelectedReport()">
                <span class="ts-icon is-print-icon" style="margin-right: 6px;"></span> 直接列印
            </button>
        </div>
        <div class="chart-container" style="position: relative; height: 350px; width: 100%; margin-bottom: 40px;">
            <div class="ts-container is-fluid" style="padding: 20px; background-color: var(--my-bg); border-radius: 12px; border: 1px solid var(--my-border); box-sizing: border-box; width: 1800px; height: 400px;">
                <canvas id="alertTrendChart" style="margin-top: 20px; width: 1800px; height: 350px;"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- 僅保留一個乾淨的外殼 Wrapper 載入過磅組件 -->
<div id="monitor-section-wrapper" style="margin-top: 20px;">
    {% include 'management/alert_monitor_section.html' %}
</div>
